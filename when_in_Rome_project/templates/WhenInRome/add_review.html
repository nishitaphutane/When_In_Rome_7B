{% extends 'WhenInRome/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Add Review</h2>
    <h4>{{ recommendation.title }}</h4>
    <p>{{ recommendation.description }}</p>

    {% if error_message %}
    <p style="color: red;">{{ error_message }}</p>
    {% endif %}

    <form id="review-form" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Submit Review</button>
    </form>

    <div id="response-message" style="margin-top: 15px;"></div>
</div>

<script>
    document.getElementById("review-form").addEventListener("submit", async function (e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);

        const response = await fetch("", {
            method: "POST",
            headers: {
                "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value
            },
            body: formData
        });

        const data = await response.json();
        const messageBox = document.getElementById("response-message");

        if (response.ok) {
            messageBox.innerHTML = `<p style="color: green;">Review submitted! Rating: ${data.review.rating}, Comment: ${data.review.comment}</p>`;
        } else {
            messageBox.innerHTML = `<p style="color: red;">${data.error}</p>`;
        }
    });
</script>
{% endblock %}
