{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>When In Rome</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="body">
    <section class="hero-section" style='background-image: url("{% static "images/Glasgow.jpg" %}")'>
        <nav class="navbar navbar-expand-lg navbar-dark pt-3">
            <div class="container">
                <a class="navbar-brand logo-cursive" href="{% url 'WhenInRome:index' %}" > When In Rome</a>
                <div class="ms-auto d-flex gap-2 align-items-center">
                    <a href="{% url 'WhenInRome:about' %}" class="btn btn-outline-light rounded-pill">About</a>
                    {% if user.is_authenticated %}
                        <a class="btn btn-outline-light rounded-pill" href="{% url 'WhenInRome:logout' %}">Logout</a>
                    {% else %}
                        <a class="btn btn-outline-light rounded-pill" href="{% url 'WhenInRome:register' %}">Sign Up</a>
                        <a class="btn btn-light rounded-pill" href="{% url 'WhenInRome:login' %}">Login</a>
                    {% endif %}
                </div>
            </div>
        </nav>
        <div class="hero-search-container">
            <form action="{% url 'WhenInRome:index' %}" method="get" class="search-box-wrapper shadow-lg overflow-hidden rounded-pill bg-white p-1">
                <div class="input-group">
                    <input name="q" type="text" class="form-control hero-search-input border-0 shadow-none ps-4 w-100" placeholder="Where do you want to go?">
                    <button type="submit" class="btn btn-search rounded-pill px-4">Search</button>
                </div>
            </form>
        </div>
    </section>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
