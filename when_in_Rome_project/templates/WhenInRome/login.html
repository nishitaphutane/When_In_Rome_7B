{% extends 'WhenInRome/base.html' %}

{% block content %}
<div class="container py-4">
    <h1>Login</h1>

    <form id="login_form" method="post" action="{% url 'WhenInRome:login' %}">
        {% csrf_token %}
        <p>
            Username:
            <input type="text" name="username" size="50">
        </p>
        <p>
            Password:
            <input type="password" name="password" size="50">
        </p>
        <input type="submit" value="Login" class="btn btn-primary">
    </form>
</div>
{% endblock %}
