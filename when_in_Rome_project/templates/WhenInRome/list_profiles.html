{% extends 'WhenInRome/base.html' %}

{% block content %}
<div class="container py-4">
    <h1>User Profiles</h1>

    {% if userprofile_list %}
        <div class="list-group">
            {% for list_user in userprofile_list %}
                <div class="list-group-item">
                    <h4>
                        <a href="{% url 'WhenInRome:profile' list_user.user.username %}">
                            {{ list_user.user.username }}
                        </a>
                    </h4>
                    <p>Followers: {{ list_user.followers.count }}</p>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>There are no users yet.</p>
    {% endif %}
</div>
{% endblock %}
