{% extends 'WhenInRome/base.html' %}

{% block content %}
<div class="container py-4">
    <h1>Register for When In Rome</h1>

    {% if registered %}
        <strong>Thank you for registering!</strong>
        <a href="{% url 'WhenInRome:index' %}">Return to the homepage.</a><br />
    {% else %}
        <form id="user_form" method="post" action="{% url 'WhenInRome:register' %}" enctype="multipart/form-data">
            {% csrf_token %}
            {{ user_form.as_p }}
            {{ profile_form.as_p }}
            <input type="submit" name="submit" value="Register" class="btn btn-primary">
        </form>
    {% endif %}
</div>
{% endblock %}
